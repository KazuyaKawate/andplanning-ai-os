version: "3.9"

services:

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/data:/app/data     # SQLite DB persistence
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./website
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "https://ap-aios.com"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "https://ap-aios.com"
      NODE_ENV: "production"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx Reverse Proxy (Production) ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
