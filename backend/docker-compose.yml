version: "3.9"

services:

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"          # expose for local dev; remove in prod (nginx handles it)
    volumes:
      - ./data:/app/data     # SQLite DB persistence
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ../website
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "https://your-domain.com"
    ports:
      - "3000:3000"          # expose for local dev; remove in prod
    environment:
      NEXT_PUBLIC_API_BASE_URL: "https://your-domain.com"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── nginx reverse proxy (production) ──────────────────────────────────────
  # Uncomment for production. Requires ssl/ directory with cert.pem + key.pem.
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ../nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   restart: unless-stopped
