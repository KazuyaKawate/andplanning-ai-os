name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  backend-check:
    name: Backend — import & lint check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify all module imports
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./data/test.db"
          JWT_SECRET_KEY: "ci-test-secret-not-production"
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          GOOGLE_API_KEY: ""
        run: |
          python -c "
          import app.main
          import app.auth
          import app.models
          import app.migrations
          import app.routers.auth
          import app.routers.settings
          import app.routers.dev
          import app.routers.debug
          import app.routers.team
          import app.routers.health
          import app.routers.notifications
          import app.services.ollama_svc
          import app.services.retry
          import app.services.ai_router
          print('All backend imports OK')
          "

  frontend-typecheck:
    name: Frontend — TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  frontend-build:
    name: Frontend — Next.js build
    runs-on: ubuntu-latest
    needs: frontend-typecheck
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: website/.next
          retention-days: 7
          if-no-files-found: error
